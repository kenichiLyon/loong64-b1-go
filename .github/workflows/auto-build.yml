name: Auto Build

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Test and package Go artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          check-latest: true
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l cmd internal)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Build release artifacts
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o dist/loong64-b1-go-linux-amd64 ./cmd/server
          GOOS=linux GOARCH=loong64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o dist/loong64-b1-go-linux-loong64 ./cmd/server
          GOOS=linux GOARCH=loong64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o dist/loong64-b1-migrate-linux-loong64 ./cmd/migrate
          cp README.md PLAN.md AGENT.md dist/
          (cd dist && sha256sum * > SHA256SUMS)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: auto-build-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30
