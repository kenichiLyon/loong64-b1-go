name: Auto Build

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Test and package release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l cmd internal)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Build web
        run: |
          npm ci --prefix web
          npm run build --prefix web

      - name: Build release artifacts
        run: |
          mkdir -p dist/raw
          GOOS=linux GOARCH=loong64 CGO_ENABLED=0 go build -tags webui -trimpath -ldflags="-s -w" -o dist/raw/loong64-b1-go-linux-loong64-full ./cmd/server
          GOOS=linux GOARCH=loong64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o dist/raw/loong64-b1-upgrade-linux-loong64 ./cmd/upgrade
          bash scripts/release/package-release.sh dist/raw dist/release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: auto-build-${{ github.sha }}
          path: dist/release/*
          if-no-files-found: error
          retention-days: 30
