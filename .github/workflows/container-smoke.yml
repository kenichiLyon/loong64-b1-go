name: Container Smoke

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  container-smoke:
    name: Build and smoke test container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker buildx build --file Containerfile --tag loong64-b1-go:container-smoke --load .

      - name: Start container
        run: docker run -d --rm --name loong64-b1-go-smoke -p 18080:8080 loong64-b1-go:container-smoke

      - name: Wait for health endpoint
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/health/ready >/tmp/ready.json; then
              cat /tmp/ready.json
              exit 0
            fi
            sleep 2
          done
          echo "container did not become ready in time" >&2
          docker logs loong64-b1-go-smoke || true
          exit 1

      - name: Verify bootstrap status
        run: curl -fsS http://127.0.0.1:18080/api/v1/bootstrap/status

      - name: Cleanup
        if: always()
        run: |
          docker logs loong64-b1-go-smoke || true
          docker stop loong64-b1-go-smoke || true
