openapi: 3.1.0
info:
  title: loong64-b1-go API
  version: 0.7.0
  description: 基于大模型技术的软件实训教学结果检查评价与报表系统 API。
servers:
  - url: http://127.0.0.1:8080
paths:
  /health:
    get:
      summary: 存活检查兼容入口
      operationId: getHealth
      responses:
        '200':
          description: 服务进程存活
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSnapshot'
  /health/live:
    get:
      summary: 存活检查
      operationId: getLiveHealth
      responses:
        '200':
          description: 服务进程存活
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSnapshot'
  /health/ready:
    get:
      summary: 就绪检查
      operationId: getReadyHealth
      responses:
        '200':
          description: 数据库和对象存储均可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSnapshot'
        '503':
          description: 至少一个依赖不可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSnapshot'
  /api/v1/me:
    get:
      summary: 当前操作者
      operationId: getCurrentActor
      responses:
        '200':
          description: 当前操作者 ID 和角色
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Actor'
        '401':
          $ref: '#/components/responses/Error'
  /api/v1/admin/users:
    get:
      summary: 管理员查询用户
      operationId: listAdminUsers
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: 用户列表
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/Error'
    post:
      summary: 管理员创建用户
      operationId: createAdminUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: 用户已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/admin/users/{userId}/roles:
    put:
      summary: 管理员设置用户角色
      operationId: setAdminUserRoles
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRolesRequest'
      responses:
        '204':
          description: 角色已更新
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /api/v1/admin/classes:
    post:
      summary: 管理员创建班级
      operationId: createAdminClass
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClassRequest'
      responses:
        '201':
          description: 班级已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Class'
  /api/v1/admin/courses:
    post:
      summary: 管理员创建课程
      operationId: createAdminCourse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseRequest'
      responses:
        '201':
          description: 课程已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
  /api/v1/admin/courses/{courseId}/classes:
    put:
      summary: 管理员关联课程班级
      operationId: addAdminCourseClass
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [class_id]
              properties:
                class_id:
                  type: string
      responses:
        '204':
          description: 课程班级关系已保存
  /api/v1/admin/courses/{courseId}/teachers:
    put:
      summary: 管理员分配课程教师
      operationId: assignAdminCourseTeacher
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignTeacherRequest'
      responses:
        '204':
          description: 教师授权已保存
  /api/v1/admin/courses/{courseId}/enrollments:
    put:
      summary: 管理员维护选课关系
      operationId: upsertAdminCourseEnrollment
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollStudentRequest'
      responses:
        '204':
          description: 选课关系已保存
  /api/v1/teacher/rubric-templates:
    post:
      summary: 教师创建评价模板
      operationId: createTeacherRubricTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRubricTemplateRequest'
      responses:
        '201':
          description: 模板已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RubricTemplate'
  /api/v1/teacher/rubric-templates/{templateId}/versions:
    post:
      summary: 教师创建评价模板版本
      operationId: createTeacherRubricVersion
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRubricVersionRequest'
      responses:
        '201':
          description: 模板版本已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RubricVersionWithMetrics'
  /api/v1/teacher/rubric-template-versions/{versionId}/publish:
    post:
      summary: 教师发布评价模板版本
      operationId: publishTeacherRubricVersion
      parameters:
        - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: 模板版本已发布
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RubricTemplateVersion'
  /api/v1/teacher/courses/{courseId}/experiments:
    post:
      summary: 教师创建实训任务
      operationId: createTeacherExperiment
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExperimentRequest'
      responses:
        '201':
          description: 实训任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Experiment'
  /api/v1/teacher/experiments/{experimentId}/publish:
    post:
      summary: 教师发布实训任务
      operationId: publishTeacherExperiment
      parameters:
        - $ref: '#/components/parameters/ExperimentId'
      responses:
        '200':
          description: 实训任务已发布
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Experiment'
  /api/v1/student/experiments/{experimentId}/submissions:
    post:
      summary: 学生创建实训提交
      operationId: createStudentSubmission
      parameters:
        - $ref: '#/components/parameters/ExperimentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubmissionRequest'
      responses:
        '201':
          description: 提交记录已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Submission'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /api/v1/student/submissions/{submissionId}/artifacts:
    post:
      summary: 学生上传成果附件
      operationId: uploadStudentSubmissionArtifact
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                artifact_kind:
                  $ref: '#/components/schemas/ArtifactKind'
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: 附件已保存并创建解析任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactWithExtraction'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /api/v1/student/submissions/{submissionId}/artifact-links:
    post:
      summary: 学生登记 Git 链接成果
      operationId: createStudentSubmissionArtifactLink
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGitLinkRequest'
      responses:
        '201':
          description: Git 链接已登记
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactWithExtraction'
  /api/v1/student/submissions/{submissionId}:
    get:
      summary: 学生查看自己的提交详情
      operationId: getStudentSubmission
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      responses:
        '200':
          description: 提交详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionDetail'
        '403':
          $ref: '#/components/responses/Error'
  /api/v1/teacher/experiments/{experimentId}/submissions:
    get:
      summary: 教师查看实训提交列表
      operationId: listTeacherExperimentSubmissions
      parameters:
        - $ref: '#/components/parameters/ExperimentId'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: 提交列表
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Submission'
        '403':
          $ref: '#/components/responses/Error'
  /api/v1/teacher/submissions/{submissionId}:
    get:
      summary: 教师查看提交详情
      operationId: getTeacherSubmission
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      responses:
        '200':
          description: 提交详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionDetail'
        '403':
          $ref: '#/components/responses/Error'
  /api/v1/teacher/submissions/{submissionId}/evaluations/initial:
    post:
      summary: 教师触发规则核查与可选 LLM 初评
      operationId: createTeacherSubmissionInitialEvaluation
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInitialEvaluationRequest'
      responses:
        '201':
          description: 初评结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationResultDetail'
        '403':
          $ref: '#/components/responses/Error'
  /api/v1/teacher/submissions/{submissionId}/evaluations/latest:
    get:
      summary: 教师查看最新规则核查与初评结果
      operationId: getTeacherSubmissionLatestEvaluation
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      responses:
        '200':
          description: 最新初评结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationResultDetail'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/teacher/submissions/{submissionId}/review:
    get:
      summary: 教师查看复核草稿或已发布结果
      operationId: getTeacherSubmissionReview
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      responses:
        '200':
          description: 教师复核详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherReviewDetail'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    put:
      summary: 教师保存复核草稿
      operationId: upsertTeacherSubmissionReview
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertTeacherReviewRequest'
      responses:
        '200':
          description: 已保存复核草稿
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherReviewDetail'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/teacher/submissions/{submissionId}/review/publish:
    post:
      summary: 教师发布最终评价
      operationId: publishTeacherSubmissionReview
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishTeacherReviewRequest'
      responses:
        '200':
          description: 已发布最终评价
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherReviewDetail'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/student/submissions/{submissionId}/review:
    get:
      summary: 学生查看已发布最终评价
      operationId: getStudentPublishedReview
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      responses:
        '200':
          description: 已发布最终评价
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherReviewDetail'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'

  /api/v1/teacher/submissions/{submissionId}/report:
    get:
      summary: 教师查看学生个人评价报告
      operationId: getTeacherSubmissionReport
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      responses:
        '200':
          description: 个人评价报告
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionReport'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/student/submissions/{submissionId}/report:
    get:
      summary: 学生查看自己的已发布个人评价报告
      operationId: getStudentSubmissionReport
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      responses:
        '200':
          description: 已发布个人评价报告
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionReport'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/teacher/submissions/{submissionId}/report-exports:
    post:
      summary: 教师创建个人评价报告导出
      operationId: createTeacherSubmissionReportExport
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportExportRequest'
      responses:
        '202':
          description: 导出任务已记录；HTML/CSV 同步生成，PDF 按 LoongArch 风险策略降级记录。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportExport'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /api/v1/teacher/experiments/{experimentId}/reports/summary:
    get:
      summary: 教师查看实验统计报表
      operationId: getTeacherExperimentReportSummary
      parameters:
        - $ref: '#/components/parameters/ExperimentId'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: 实验统计报表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentReportSummary'
        '403':
          $ref: '#/components/responses/Error'
  /api/v1/teacher/experiments/{experimentId}/report-exports:
    post:
      summary: 教师创建实验统计报表导出
      operationId: createTeacherExperimentReportExport
      parameters:
        - $ref: '#/components/parameters/ExperimentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportExportRequest'
      responses:
        '202':
          description: 导出任务已记录；HTML/CSV 同步生成，PDF 按 LoongArch 风险策略降级记录。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportExport'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /api/v1/teacher/report-exports/{exportId}:
    get:
      summary: 教师查询报表导出状态
      operationId: getTeacherReportExport
      parameters:
        - $ref: '#/components/parameters/ExportId'
      responses:
        '200':
          description: 导出任务状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportExport'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/teacher/report-exports/{exportId}/download:
    get:
      summary: 教师下载报表导出文件
      operationId: downloadTeacherReportExport
      parameters:
        - $ref: '#/components/parameters/ExportId'
      responses:
        '200':
          description: 导出文件内容
          headers:
            X-Content-SHA256:
              schema:
                type: string
          content:
            text/html:
              schema:
                type: string
            text/csv:
              schema:
                type: string
        '403':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
components:
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
    CourseId:
      name: courseId
      in: path
      required: true
      schema:
        type: string
    TemplateId:
      name: templateId
      in: path
      required: true
      schema:
        type: string
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
    ExperimentId:
      name: experimentId
      in: path
      required: true
      schema:
        type: string
    SubmissionId:
      name: submissionId
      in: path
      required: true
      schema:
        type: string
    ExportId:
      name: exportId
      in: path
      required: true
      schema:
        type: string
  responses:
    Error:
      description: 统一错误响应
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthSnapshot:
      type: object
      required: [status, service, goos, goarch, time]
      properties:
        status:
          type: string
          enum: [ok, fail]
        service:
          type: string
          example: loong64-b1-go
        goos:
          type: string
          example: linux
        goarch:
          type: string
          example: loong64
        time:
          type: string
          format: date-time
        checks:
          type: array
          items:
            type: object
            required: [name, status, duration]
            properties:
              name:
                type: string
                example: postgres
              status:
                type: string
                enum: [ok, fail]
              error:
                type: string
              duration:
                type: string
                example: 2ms
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
    Actor:
      type: object
      required: [id, roles]
      properties:
        id:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    Role:
      type: string
      enum: [admin, teacher, student]
    User:
      type: object
      required: [id, username, display_name, status, roles, created_at, updated_at]
      properties:
        id:
          type: string
        username:
          type: string
        display_name:
          type: string
        email:
          type: string
        student_no:
          type: string
        employee_no:
          type: string
        status:
          type: string
          enum: [active, disabled]
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateUserRequest:
      type: object
      required: [username, display_name, roles]
      properties:
        username:
          type: string
        display_name:
          type: string
        email:
          type: string
        student_no:
          type: string
        employee_no:
          type: string
        status:
          type: string
          enum: [active, disabled]
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    SetRolesRequest:
      type: object
      required: [roles]
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    Class:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        grade_year:
          type: integer
        major:
          type: string
        status:
          type: string
          enum: [active, archived]
    CreateClassRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
        name:
          type: string
        grade_year:
          type: integer
        major:
          type: string
        status:
          type: string
          enum: [active, archived]
    Course:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        term:
          type: string
        status:
          type: string
          enum: [draft, active, archived]
        created_by:
          type: string
    CreateCourseRequest:
      type: object
      required: [code, name, term]
      properties:
        code:
          type: string
        name:
          type: string
        term:
          type: string
        status:
          type: string
