openapi: 3.1.0
info:
  title: loong64-b1-go API
  version: 0.3.0
  description: 基于大模型技术的软件实训教学结果检查评价与报表系统 API。
servers:
  - url: http://127.0.0.1:8080
paths:
  /health:
    get:
      summary: 存活检查兼容入口
      operationId: getHealth
      responses:
        '200':
          description: 服务进程存活
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSnapshot'
  /health/live:
    get:
      summary: 存活检查
      operationId: getLiveHealth
      responses:
        '200':
          description: 服务进程存活
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSnapshot'
  /health/ready:
    get:
      summary: 就绪检查
      operationId: getReadyHealth
      responses:
        '200':
          description: 数据库和对象存储均可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSnapshot'
        '503':
          description: 至少一个依赖不可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSnapshot'
  /api/v1/me:
    get:
      summary: 当前操作者
      operationId: getCurrentActor
      responses:
        '200':
          description: 当前操作者 ID 和角色
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Actor'
        '401':
          $ref: '#/components/responses/Error'
  /api/v1/admin/users:
    get:
      summary: 管理员查询用户
      operationId: listAdminUsers
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: 用户列表
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/Error'
    post:
      summary: 管理员创建用户
      operationId: createAdminUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: 用户已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/admin/users/{userId}/roles:
    put:
      summary: 管理员设置用户角色
      operationId: setAdminUserRoles
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRolesRequest'
      responses:
        '204':
          description: 角色已更新
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /api/v1/admin/classes:
    post:
      summary: 管理员创建班级
      operationId: createAdminClass
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClassRequest'
      responses:
        '201':
          description: 班级已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Class'
  /api/v1/admin/courses:
    post:
      summary: 管理员创建课程
      operationId: createAdminCourse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseRequest'
      responses:
        '201':
          description: 课程已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
  /api/v1/admin/courses/{courseId}/classes:
    put:
      summary: 管理员关联课程班级
      operationId: addAdminCourseClass
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [class_id]
              properties:
                class_id:
                  type: string
      responses:
        '204':
          description: 课程班级关系已保存
  /api/v1/admin/courses/{courseId}/teachers:
    put:
      summary: 管理员分配课程教师
      operationId: assignAdminCourseTeacher
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignTeacherRequest'
      responses:
        '204':
          description: 教师授权已保存
  /api/v1/admin/courses/{courseId}/enrollments:
    put:
      summary: 管理员维护选课关系
      operationId: upsertAdminCourseEnrollment
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollStudentRequest'
      responses:
        '204':
          description: 选课关系已保存
  /api/v1/teacher/rubric-templates:
    post:
      summary: 教师创建评价模板
      operationId: createTeacherRubricTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRubricTemplateRequest'
      responses:
        '201':
          description: 模板已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RubricTemplate'
  /api/v1/teacher/rubric-templates/{templateId}/versions:
    post:
      summary: 教师创建评价模板版本
      operationId: createTeacherRubricVersion
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRubricVersionRequest'
      responses:
        '201':
          description: 模板版本已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RubricVersionWithMetrics'
  /api/v1/teacher/rubric-template-versions/{versionId}/publish:
    post:
      summary: 教师发布评价模板版本
      operationId: publishTeacherRubricVersion
      parameters:
        - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: 模板版本已发布
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RubricTemplateVersion'
  /api/v1/teacher/courses/{courseId}/experiments:
    post:
      summary: 教师创建实训任务
      operationId: createTeacherExperiment
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExperimentRequest'
      responses:
        '201':
          description: 实训任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Experiment'
  /api/v1/teacher/experiments/{experimentId}/publish:
    post:
      summary: 教师发布实训任务
      operationId: publishTeacherExperiment
      parameters:
        - $ref: '#/components/parameters/ExperimentId'
      responses:
        '200':
          description: 实训任务已发布
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Experiment'
components:
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
    CourseId:
      name: courseId
      in: path
      required: true
      schema:
        type: string
    TemplateId:
      name: templateId
      in: path
      required: true
      schema:
        type: string
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
    ExperimentId:
      name: experimentId
      in: path
      required: true
      schema:
        type: string
  responses:
    Error:
      description: 统一错误响应
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthSnapshot:
      type: object
      required: [status, service, goos, goarch, time]
      properties:
        status:
          type: string
          enum: [ok, fail]
        service:
          type: string
          example: loong64-b1-go
        goos:
          type: string
          example: linux
        goarch:
          type: string
          example: loong64
        time:
          type: string
          format: date-time
        checks:
          type: array
          items:
            type: object
            required: [name, status, duration]
            properties:
              name:
                type: string
                example: postgres
              status:
                type: string
                enum: [ok, fail]
              error:
                type: string
              duration:
                type: string
                example: 2ms
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
    Actor:
      type: object
      required: [id, roles]
      properties:
        id:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    Role:
      type: string
      enum: [admin, teacher, student]
    User:
      type: object
      required: [id, username, display_name, status, roles, created_at, updated_at]
      properties:
        id:
          type: string
        username:
          type: string
        display_name:
          type: string
        email:
          type: string
        student_no:
          type: string
        employee_no:
          type: string
        status:
          type: string
          enum: [active, disabled]
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateUserRequest:
      type: object
      required: [username, display_name, roles]
      properties:
        username:
          type: string
        display_name:
          type: string
        email:
          type: string
        student_no:
          type: string
        employee_no:
          type: string
        status:
          type: string
          enum: [active, disabled]
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    SetRolesRequest:
      type: object
      required: [roles]
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    Class:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        grade_year:
          type: integer
        major:
          type: string
        status:
          type: string
          enum: [active, archived]
    CreateClassRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
        name:
          type: string
        grade_year:
          type: integer
        major:
          type: string
        status:
          type: string
          enum: [active, archived]
    Course:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        term:
          type: string
        status:
          type: string
          enum: [draft, active, archived]
        created_by:
          type: string
    CreateCourseRequest:
      type: object
      required: [code, name, term]
      properties:
        code:
          type: string
        name:
          type: string
        term:
          type: string
        status:
          type: string
          enum: [draft, active, archived]
    AssignTeacherRequest:
      type: object
      required: [teacher_id]
      properties:
        teacher_id:
          type: string
        permission:
          type: string
          enum: [owner, editor, viewer]
    EnrollStudentRequest:
      type: object
      required: [student_id]
      properties:
        class_id:
          type: string
        student_id:
          type: string
        status:
          type: string
          enum: [active, dropped]
    RubricTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        owner_id:
          type: string
        scope:
          type: string
          enum: [private, course, global]
        status:
          type: string
          enum: [draft, active, archived]
    CreateRubricTemplateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        scope:
          type: string
          enum: [private, course, global]
        status:
          type: string
          enum: [draft, active, archived]
    RubricTemplateVersion:
      type: object
      properties:
        id:
          type: string
        template_id:
          type: string
        version_no:
          type: integer
        status:
          type: string
          enum: [draft, published, archived]
        weight_mode:
          type: string
          enum: [strict_100, normalized]
        total_weight_bps:
          type: integer
        published_at:
          type: string
          format: date-time
    MetricInput:
      type: object
      required: [code, name, weight_bps, max_score, sort_order]
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        weight_bps:
          type: integer
          description: 整数基点，100% = 10000
        max_score:
          type: integer
        sort_order:
          type: integer
        required_evidence:
          type: object
    Metric:
      allOf:
        - $ref: '#/components/schemas/MetricInput'
        - type: object
          properties:
            id:
              type: string
            version_id:
              type: string
    CreateRubricVersionRequest:
      type: object
      required: [weight_mode, metrics]
      properties:
        weight_mode:
          type: string
          enum: [strict_100, normalized]
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/MetricInput'
    RubricVersionWithMetrics:
      type: object
      required: [version, metrics]
      properties:
        version:
          $ref: '#/components/schemas/RubricTemplateVersion'
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/Metric'
    Experiment:
      type: object
      properties:
        id:
          type: string
        course_id:
          type: string
        title:
          type: string
        description:
          type: string
        submission_spec:
          type: object
        rubric_version_id:
          type: string
        status:
          type: string
          enum: [draft, published, closed, archived]
        start_at:
          type: string
          format: date-time
        due_at:
          type: string
          format: date-time
        published_at:
          type: string
          format: date-time
        created_by:
          type: string
    CreateExperimentRequest:
      type: object
      required: [title, rubric_version_id]
      properties:
        title:
          type: string
        description:
          type: string
        submission_spec:
          type: object
        rubric_version_id:
          type: string
        start_at:
          type: string
          format: date-time
        due_at:
          type: string
          format: date-time
